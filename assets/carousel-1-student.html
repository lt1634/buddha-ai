<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>指月 Carousel 1 — 中學生・讀書壓力</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #f5f0e8; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding: 40px 20px;
    font-family: "PingFang HK", "Noto Sans HK", "Microsoft JhengHei", sans-serif;
  }
  .slide {
    width: 1080px;
    height: 1080px;
    background: #f5f0e8;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 120px 100px;
    margin-bottom: 40px;
    position: relative;
    border: 1px solid #e0dbd3;
  }
  .slide .main-text {
    color: #4a4a4a;
    font-size: 56px;
    line-height: 1.6;
    font-weight: 300;
    letter-spacing: 2px;
  }
  .slide .sub-text {
    color: #8a8a8a;
    font-size: 28px;
    line-height: 1.6;
    margin-top: 20px;
    font-weight: 300;
  }
  .slide .brand {
    position: absolute;
    bottom: 40px;
    right: 50px;
    color: #b0a89a;
    font-size: 20px;
    letter-spacing: 3px;
  }
  .slide .highlight {
    color: #4a4a4a;
    font-weight: 500;
  }
  .slide-action {
    background: #e8f0e8;
  }
  .slide-end {
    background: #f5f0e8;
  }
  h1 {
    color: #4a4a4a;
    font-size: 32px;
    margin-bottom: 40px;
    font-weight: 400;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<h1>Carousel 1：中學生・讀書壓力（6張）</h1>

<!-- P1: Cover -->
<div class="slide">
  <div class="main-text">「我覺得自己讀極都唔得。」</div>
  <div class="sub-text">那把說你「冇用」的聲音，其實唔係你。</div>
  <div class="brand">🌙 指月</div>
</div>

<!-- P2 -->
<div class="slide">
  <div class="main-text">讀到攰、又見唔到成績，<br>嗰種懷疑真係好磨人。</div>
  <div class="sub-text">先唞一唞。</div>
  <div class="brand">🌙 指月</div>
</div>

<!-- P3 -->
<div class="slide">
  <div class="main-text">你心入面有把聲叫「我冇用」——<br><br>但佢只係一個喺你攰嘅時候<br>走出嚟嘅念頭。</div>
  <div class="sub-text">佢嚟咗，佢都會走。<br>你唔需要即刻信佢。</div>
  <div class="brand">🌙 指月</div>
</div>

<!-- P4 -->
<div class="slide">
  <div class="main-text">諸行無常——<br>冇一樣嘢係定死嘅。</div>
  <div class="sub-text">你今日覺得自己唔得，<br>唔代表你係咁。</div>
  <div class="brand">🌙 指月</div>
</div>

<!-- P5: Action -->
<div class="slide slide-action">
  <div class="main-text">今晚唔好諗「我要叻晒」。</div>
  <div class="sub-text">只揀一樣最細嘅嘢，專心做十分鐘。<br><br>行得一步，自然見到下一步。</div>
  <div class="brand">🌙 指月</div>
</div>

<!-- P6: End -->
<div class="slide slide-end">
  <div class="main-text">你肯講出嚟，<br>已經唔係冇用嘅人。</div>
  <div class="sub-text">🌙</div>
  <div class="brand">🌙 指月</div>
</div>

</body>
</html>
